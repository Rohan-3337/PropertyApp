name: Firebase App Distribution
on:
  push:
    branches: [main, master]
jobs:
  deploy:
    name: Build APK → Firebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install deps
        run: npm install --legacy-peer-deps
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
      - name: Patch build.gradle release signing
        run: |
          python3 - << 'EOF'
          import re
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          release_config = '''        release {
                  storeFile file("../app/release.keystore")
                  storePassword System.getenv("MYAPP_UPLOAD_STORE_PASSWORD")
                  keyAlias System.getenv("MYAPP_UPLOAD_KEY_ALIAS")
                  keyPassword System.getenv("MYAPP_UPLOAD_KEY_PASSWORD")
              }
          '''
          if 'signingConfigs {' in content and 'release {' not in content:
              content = content.replace('signingConfigs {', 'signingConfigs {\n' + release_config)
          content = re.sub(r'signingConfig signingConfigs\.debug', 'signingConfig signingConfigs.release', content)
          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          print("Patched!")
          EOF
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: |
            ${{ github.ref_name }} — ${{ github.sha }}
            ${{ github.event.head_commit.message }}
